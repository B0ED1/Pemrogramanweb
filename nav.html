<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portofolio</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            margin: 0;
            padding: 30px;
            background-color: #fff;
            color: #333;
        }
        header {
            margin-top: 20px;
        }
        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        nav {
            margin-bottom: 50px;
            border-bottom: 1px solid #eee;
            padding-bottom: 20px;
        }
        nav a {
            margin: 0 15px;
            text-decoration: none;
            color: #000;
            font-weight: bold;
            transition: color 0.3s;
        }
        nav a:hover {
            color: #666;
        }
        h2 {
            margin-top: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }
        .student-id {
            color: #666;
            font-size: 1.1em;
            margin-top: 0;
            margin-bottom: 20px;
        }
        .profile-pic {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #eee;
            margin-top: 10px;
            transition: transform 0.3s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .profile-pic:hover {
            transform: scale(1.05);
            border-color: #333;
        }
        .intro-text {
            max-width: 600px;
            margin: 30px auto;
            color: #555;
            font-size: 1.1em;
        }
    </style>
</head>
<body>
    <header>
        <h1>Welcome To My Portofolio</h1>
    </header>

    <nav>
        <a href="nav.html">Home</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
    </nav>

    <img src="Addon/piccc.jpeg" alt="M Arif Budi Prakoso" class="profile-pic">

    <h2>M Arif Budi Prakoso</h2>
    <p class="student-id">241110103</p>

    <div class="intro-text">
        <p>Mahasiswa Prodi Informatika Universitas Mercu Buana Yogyakarta</p>
    </div>
</body>
</html>
