<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page 3 - Good Byes</title>
    <style>
        body {
            background-color: #f0f4f8;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .content-card {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 24px;
            border: 1px solid #cbd5e1;
            display: inline-block;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        img {
            max-width: 100%;
            height: auto;
            border-radius: 15px;
            border: 1px solid #f1f5f9;
            margin-bottom: 30px;
            transition: transform 0.3s ease;
        }

        img:hover {
            transform: scale(1.02);
        }

        h1 {
            color: #1e293b;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 1.8em;
        }

        .button-container {
            margin-top: 10px;
            display: flex;
            justify-content: center;
            gap: 12px;
        }

        .btn {
            display: inline-block;
            padding: 12px 25px;
            text-decoration: none;
            border-radius: 10px;
            font-weight: bold;
            font-size: 0.95em;
            transition: all 0.3s ease;
        }

        .btn-home {
            background-color: #334155;
            color: #ffffff;
            border: 1px solid #334155;
        }

        .btn-home:hover {
            background-color: #1e293b;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(51, 65, 85, 0.2);
        }

        .btn-back {
            background-color: transparent;
            color: #334155;
            border: 1px solid #cbd5e1;
        }

        .btn-back:hover {
            background-color: #f1f5f9;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="content-card">
        <h1>Thank You!</h1>
        
        <div class="image-wrapper">
            <img src="https://i.pinimg.com/736x/db/16/15/db16151826304e74486e144760bd08be.jpg" alt="Good Byes">
        </div>

        <div class="button-container">
            <a href="page2.html" class="btn btn-back">Back to Page 2</a>
            <a href="index.html" class="btn btn-home">Back to Home</a>
        </div>
    </div>

</body>
</html>
