<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h2>Contact Me</h2>
    <p>Punya Keluhan Tentang Makanan, Minuman, Atau Pelayanan? Hubungi Kami.</p>

    <div class="contact-form">
        <form action="#">
            <label for="message">Keluhan Anda</label>
            <textarea id="message" name="message" rows="5" placeholder="Tuliskan Keluhan Anda" required></textarea>

            <button type="submit" class="btn-submit">Kirim Pesan</button>
        </form>
</body>
</html>
