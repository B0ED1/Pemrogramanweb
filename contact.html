<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            margin: 0;
            padding: 30px;
            background-color: #fff;
            color: #333;
        }
        nav {
            margin-bottom: 40px;
        }
        nav a {
            margin: 0 15px;
            text-decoration: none;
            color: #000;
            font-weight: bold;
        }
        h2 {
            margin-top: 30px;
            text-transform: uppercase;
            border-bottom: 2px solid #ccc;
            display: inline-block;
            padding-bottom: 5px;
        }
        .contact-form {
            max-width: 450px;
            margin: 30px auto;
            padding: 30px;
            border: 1px solid #ddd;
            border-radius: 12px;
            text-align: left;
            background-color: #f9f9f9;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .contact-form label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            font-size: 0.9em;
        }
        .contact-form input, .contact-form textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-family: inherit;
        }
        .contact-form input:focus, .contact-form textarea:focus {
            outline: none;
            border-color: #333;
            background-color: #fff;
        }
        .btn-submit {
            width: 100%;
            padding: 12px;
            background-color: #333;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1em;
            transition: background-color 0.3s;
        }
        .btn-submit:hover {
            background-color: #555;
        }
        .social-links {
            margin-top: 20px;
        }
        .social-links a {
            display: inline-block;
            margin: 0 10px;
            color: #666;
            text-decoration: none;
            font-size: 0.9em;
        }
        .social-links a:hover {
            color: #000;
        }
    </style>
</head>
<body>
    <nav>
        <a href="nav.html">Home</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
    </nav>

    <h2>Contact Me</h2>
    <p>Punya pertanyaan atau ingin bekerja sama? Hubungi saya melalui form di bawah ini.</p>

    <div class="contact-form">
        <form action="#">
            <label for="name">Nama</label>
            <input type="text" id="name" name="name" placeholder="Masukkan nama Anda.." required>

            <label for="email">Alamat Email</label>
            <input type="email" id="email" name="email" placeholder="contoh@email.com" required>

            <label for="message">Pesan Anda</label>
            <textarea id="message" name="message" rows="5" placeholder="Tuliskan pesan atau tawaran kerja sama.." required></textarea>

            <button type="submit" class="btn-submit">Kirim Pesan</button>
        </form>

        <div class="social-links">
            <a href="https://github.com/b0ed1" target="_blank">GitHub</a>
        </div>
    </div>
</body>
</html>
