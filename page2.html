<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page 2 - Media & Form</title>
    <style>
        body {
            background-color: #f0f4f8;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            padding: 40px 20px;
            margin: 0;
            color: #334155;
        }

        .main-card {
            background-color: #ffffff;
            border-radius: 20px;
            border: 1px solid #cbd5e1;
            padding: 30px;
            max-width: 500px;
            margin: 0 auto;
            text-align: left;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        .section-title {
            display: block;
            margin-top: 15px;
            margin-bottom: 12px;
            font-weight: bold;
            color: #1e293b;
            text-transform: uppercase;
            font-size: 0.85em;
            letter-spacing: 1px;
            border-bottom: 2px solid #f1f5f9;
            padding-bottom: 5px;
        }

        audio, video {
            width: 100%;
            margin: 10px 0 25px 0;
            border-radius: 12px;
            background-color: #f8fafc;
        }

        ul {
            margin-bottom: 25px;
            padding-left: 20px;
            color: #475569;
        }

        li {
            margin-bottom: 5px;
        }

        form {
            margin-bottom: 25px;
            background-color: #f8fafc;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #f1f5f9;
        }

        label {
            cursor: pointer;
            color: #475569;
            margin-left: 5px;
        }

        .button-container {
            margin-top: 40px;
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .btn {
            display: inline-block;
            padding: 12px 28px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.95em;
            transition: all 0.3s ease;
        }

        .btn-end {
            background-color: #334155;
            color: #ffffff;
            border: 1px solid #334155;
        }

        .btn-end:hover {
            background-color: #1e293b;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(51, 65, 85, 0.2);
        }

        .btn-back {
            background-color: transparent;
            color: #334155;
            border: 1px solid #cbd5e1;
        }

        .btn-back:hover {
            background-color: #f1f5f9;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="main-card">
        <span class="section-title">Lokal Song</span>
        <audio controls src="Addon/SIENNA SPIRO - The Visitor (Official Visualizer).mp3"></audio>

        <span class="section-title">Lokal Video</span>
        <video controls src="Addon/Bruno Mars - Risk It All [Official Music Video].mp4"></video>

        <span class="section-title">List Hewan</span>
        <ul>
            <li>Ayam</li>
            <li>Sapi</li>
            <li>Kambing</li>
        </ul>

        <span class="section-title">Pilih Klub Bola</span>
        <form>
            <input type="radio" id="pilihan1" name="warna" value="merah">
            <label for="pilihan1">Manchester United</label><br>

            <input type="radio" id="pilihan2" name="warna" value="biru">
            <label for="pilihan2">Real Madrid</label><br>

            <input type="radio" id="pilihan3" name="warna" value="hijau">
            <label for="pilihan3">Barcelona</label>
        </form>

        <span class="section-title">Pilih Hobi Kamu</span>
        <form>
            <input type="checkbox" id="hobi1" name="hobi" value="coding">
            <label for="hobi1">Bermain Game</label><br>

            <input type="checkbox" id="hobi2" name="hobi" value="musik">
            <label for="hobi2">Menyanyi</label><br>

            <input type="checkbox" id="hobi3" name="hobi" value="traveling">
            <label for="hobi3">Mendengarkan Musik</label>
        </form>
    </div>

    <div class="button-container">
        <a href="index.html" class="btn btn-back">Back</a>
        <a href="page3.html" class="btn btn-end" title="This Is The END">END</a>
    </div>

</body>
</html>
